plugins {\n    id 'fabric-loom' version '0.10-SNAPSHOT'\n}\n\n// Project properties\ngroup 'com.actuallytrizon.barium'\narchivesBaseName = 'Barium'\nversion = '1.0.0'\n\n// Repository info\n// This helps the mod loader fetch metadata (optional)\n// Check mod announcement and specify metadata as per your requirements\n\nbutler {\n    // These values will be fetched by fabric-loom to build the mod files\n    modLoader 'fabric'\n    minecraftVersion '1.20.2'\n    // If using Yarn mappings, use this: yarn\n    mappings 'official'\n    // This is a suggestion, used by some mod loaders, others require their own format\n    modId 'barium'\n    // For Zipped mod archive and other resources you might need to use this in the dependencies\n    // use the mod id defined here for any fabric mods required by your project\n}
\ndependencies {\n    // The Fabric API access to numerous features\n    modCompile "net.fabricmc:fabric-api:${project.version}"\n    // Add other dependencies here\n}
\ntasks.withType(JavaCompile) {\n    options.encoding = 'UTF-8'\n}\n\n// This allows you to fetch other tasks in the loom plugin such as test sources or publish\n\n